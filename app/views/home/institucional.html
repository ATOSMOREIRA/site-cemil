<script>
(function () {
    'use strict';

    var serviceModalElement = document.getElementById('institutionalServiceModal');
    var serviceModalTitle = document.getElementById('institutionalServiceModalLabel');
    var serviceModalMeta = document.getElementById('institutionalServiceModalMeta');
    var serviceModalBody = document.getElementById('institutionalServiceModalBody');

    function getServiceModalInstance() {
        if (!serviceModalElement || !window.bootstrap || !window.bootstrap.Modal) {
            return null;
        }

        return window.bootstrap.Modal.getOrCreateInstance(serviceModalElement);
    }

    function renderServiceModal(card) {
        if (!card || !serviceModalTitle || !serviceModalBody) {
            return;
        }

        var serviceName = card.getAttribute('data-service-name') || 'Serviço';
        var subserviceCount = parseInt(card.getAttribute('data-subservice-count') || '0', 10) || 0;
        var template = card.querySelector('.inst-service-modal-template');

        serviceModalTitle.textContent = serviceName;
        if (serviceModalMeta) {
            serviceModalMeta.textContent = subserviceCount > 0
                ? subserviceCount + ' funcionalidade(s) disponível(is).'
                : 'Nenhuma funcionalidade disponível neste módulo.';
        }

        serviceModalBody.innerHTML = template ? template.innerHTML : '<p class="inst-empty-subservices mb-0"><i class="las la-info-circle me-1"></i>Nenhum subserviço disponível.</p>';
    }

    document.querySelectorAll('.js-inst-service-modal-trigger').forEach(function (trigger) {
        trigger.addEventListener('click', function () {
            var card = trigger.closest('.inst-service-card');
            renderServiceModal(card);
            var serviceModal = getServiceModalInstance();
            if (serviceModal) {
                serviceModal.show();
                return;
            }

            var fallbackLink = card ? card.querySelector('.inst-service-modal-template a.inst-dropdown-item') : null;
            if (fallbackLink && fallbackLink.href) {
                window.location.href = fallbackLink.href;
            }
        });
    });

    if (serviceModalElement) {
        serviceModalElement.addEventListener('show.bs.modal', function () {
            document.body.classList.add('inst-service-modal-open');
        });

        serviceModalElement.addEventListener('hidden.bs.modal', function () {
            document.body.classList.remove('inst-service-modal-open');
            if (serviceModalBody) {
                serviceModalBody.innerHTML = '';
            }
        });
    }

    // Search
    var searchInput = document.getElementById('institutionalServiceSearch');
    if (searchInput) {
        searchInput.addEventListener('input', function () {
            var term = searchInput.value.trim().toLowerCase();
            var items = document.querySelectorAll('.js-institutional-service-item');
            var anyVisible = false;
            items.forEach(function (item) {
                var text = (item.getAttribute('data-search-text') || '').toLowerCase();
                var show = term === '' || text.includes(term);
                item.style.display = show ? '' : 'none';
                if (show) { anyVisible = true; }
            });
            var empty = document.getElementById('institutionalServiceSearchEmpty');
            if (empty) { empty.classList.toggle('d-none', anyVisible || term === ''); }
        });
    }
}());
</script>
