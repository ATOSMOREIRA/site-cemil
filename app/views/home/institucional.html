<script>
(function () {
    'use strict';

    function closeAllDropdowns(except) {
        document.querySelectorAll('.js-inst-dropdown.inst-open').forEach(function (el) {
            if (el !== except) {
                el.classList.remove('inst-open');
                var btn = el.querySelector('.inst-service-trigger');
                if (btn) { btn.setAttribute('aria-expanded', 'false'); }
            }
        });
    }

    document.querySelectorAll('.js-inst-dropdown').forEach(function (card) {
        var trigger = card.querySelector('.inst-service-trigger');
        if (!trigger) { return; }

        trigger.addEventListener('click', function (e) {
            e.stopPropagation();
            var isOpen = card.classList.contains('inst-open');
            closeAllDropdowns(card);
            card.classList.toggle('inst-open', !isOpen);
            trigger.setAttribute('aria-expanded', String(!isOpen));
        });
    });

    document.addEventListener('click', function () {
        closeAllDropdowns(null);
    });

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { closeAllDropdowns(null); }
    });

    // Search
    var searchInput = document.getElementById('institutionalServiceSearch');
    if (searchInput) {
        searchInput.addEventListener('input', function () {
            var term = searchInput.value.trim().toLowerCase();
            var items = document.querySelectorAll('.js-institutional-service-item');
            var anyVisible = false;
            items.forEach(function (item) {
                var text = (item.getAttribute('data-search-text') || '').toLowerCase();
                var show = term === '' || text.includes(term);
                item.style.display = show ? '' : 'none';
                if (show) { anyVisible = true; }
            });
            var empty = document.getElementById('institutionalServiceSearchEmpty');
            if (empty) { empty.classList.toggle('d-none', anyVisible || term === ''); }
        });
    }
}());
</script>
