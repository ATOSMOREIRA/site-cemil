<script>
document.addEventListener('DOMContentLoaded', function () {
    var forgotPasswordModalElement = document.getElementById('loginForgotPasswordModal');
    var openForgotPasswordOnLoad = forgotPasswordModalElement && forgotPasswordModalElement.getAttribute('data-open-on-load') === '1';
    var forgotPasswordForm = document.getElementById('loginForgotPasswordForm');
    var forgotPasswordSubmitButton = document.getElementById('loginForgotPasswordSubmitButton');
    var modalFeedbackElement = forgotPasswordModalElement ? forgotPasswordModalElement.querySelector('.login-recovery-feedback') : null;
    var modalOverlayElement = forgotPasswordModalElement ? forgotPasswordModalElement.querySelector('.login-recovery-modal-overlay') : null;
    var recoveryEmailInput = document.getElementById('recovery_email');
    var asyncStatusElement = document.getElementById('loginAsyncStatus');
    var defaultSubmitButtonHtml = forgotPasswordSubmitButton ? forgotPasswordSubmitButton.innerHTML : '';

    function showAsyncStatus(message, isError) {
        if (!asyncStatusElement) {
            return;
        }

        if (!message) {
            asyncStatusElement.className = 'alert d-none mb-4';
            asyncStatusElement.textContent = '';
            return;
        }

        asyncStatusElement.className = 'alert mb-4 ' + (isError ? 'alert-danger' : 'alert-success');
        asyncStatusElement.innerHTML = '<i class="las ' + (isError ? 'la-exclamation-circle' : 'la-check-circle') + ' me-1"></i>' + String(message || '');
    }

    function showModalFeedback(message, isError) {
        if (!modalFeedbackElement) {
            return;
        }

        if (!message) {
            modalFeedbackElement.className = 'login-recovery-feedback alert d-none mb-3';
            modalFeedbackElement.textContent = '';
            return;
        }

        modalFeedbackElement.className = 'login-recovery-feedback alert mb-3 ' + (isError ? 'alert-danger' : 'alert-success');
        modalFeedbackElement.textContent = String(message);
    }

    function setLoadingState(isLoading) {
        if (forgotPasswordSubmitButton) {
            forgotPasswordSubmitButton.disabled = isLoading;
            forgotPasswordSubmitButton.innerHTML = isLoading
                ? '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Enviando...'
                : defaultSubmitButtonHtml;
        }

        if (recoveryEmailInput) {
            recoveryEmailInput.disabled = isLoading;
        }

        if (modalOverlayElement) {
            modalOverlayElement.classList.toggle('d-none', !isLoading);
        }
    }

    if (!forgotPasswordModalElement || typeof bootstrap === 'undefined' || !bootstrap.Modal) {
        return;
    }

    var forgotPasswordModalInstance = bootstrap.Modal.getOrCreateInstance(forgotPasswordModalElement);

    forgotPasswordModalElement.addEventListener('hidden.bs.modal', function () {
        setLoadingState(false);
        showModalFeedback('', false);
    });

    if (forgotPasswordForm) {
        forgotPasswordForm.addEventListener('submit', function (event) {
            event.preventDefault();
            showModalFeedback('', false);
            showAsyncStatus('', false);
            var formData = new FormData(forgotPasswordForm);
            setLoadingState(true);

            fetch(forgotPasswordForm.action, {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'Accept': 'application/json'
                },
                body: formData
            })
                .then(function (response) {
                    return response.json().catch(function () {
                        return {
                            ok: false,
                            message: 'Nao foi possivel concluir a recuperacao agora.'
                        };
                    }).then(function (payload) {
                        return {
                            ok: response.ok && !!payload.ok,
                            message: payload && payload.message ? payload.message : 'Nao foi possivel concluir a recuperacao agora.'
                        };
                    });
                })
                .then(function (result) {
                    if (!result.ok) {
                        showModalFeedback(result.message, true);
                        return;
                    }

                    forgotPasswordForm.reset();
                    showAsyncStatus(result.message, false);
                    forgotPasswordModalInstance.hide();
                })
                .catch(function () {
                    showModalFeedback('Nao foi possivel enviar a senha temporaria agora. Tente novamente em instantes.', true);
                })
                .finally(function () {
                    setLoadingState(false);
                });
        });
    }

    if (openForgotPasswordOnLoad) {
        forgotPasswordModalInstance.show();
    }
});
</script>
